<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة نَـبْـضَـة | لوحة تسجيل الرواد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* نمط الـ Glassmorphism المطور */
        :root { --neon-cyan: #00f2ff; --dark-blue: #050a19; }
        body {
            background: var(--dark-blue);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px;
            width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .pulse-btn {
            background: linear-gradient(45deg, #0072ff, var(--neon-cyan));
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            color: #050a19;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .pulse-btn:disabled { background: #444; cursor: not-allowed; }
        .pulse-icon { font-size: 40px; color: var(--neon-cyan); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        .input-box { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 8px; color: white; text-align: right; }
    </style>
</head>
<body>

<div class="glass-card">
    <i class="fas fa-heartbeat pulse-icon"></i>
    <h2>نَـبْـضَـة | NABDA</h2>
    <p style="font-size: 0.8em; color: #aaa;">نظام تسجيل الرواد - بروتوكول نيويورك</p>
    
    <div id="form-container">
        <input type="text" id="r_name" class="input-box" placeholder="اسم رائد الأعمال">
        <input type="text" id="r_project" class="input-box" placeholder="اسم المشروع">
        <p id="calc" style="color: var(--neon-cyan); font-weight: bold;">الإجمالي: 8,000 د.ل</p>
        <button id="sendBtn" class="pulse-btn" onclick="processPulse()">إرسال النبضة</button>
        <p id="timer" style="font-size: 0.7em; color: #ff4444; margin-top: 10px;"></p>
    </div>
</div>

<script>
    // نظام الـ Cooldown (7 أيام في الإنتاج، 10 ثواني للتجربة الآن)
    let lastPulse = localStorage.getItem('lastPulse');

    function processPulse() {
        const now = Date.now();
        const cooldown = 10000; // 10 ثواني للتجربة

        if (lastPulse && (now - lastPulse < cooldown)) {
            document.getElementById('timer').innerText = "يرجى الانتظار حتى انتهاء فترة الـ Cooldown";
            return;
        }

        const name = document.getElementById('r_name').value;
        const project = document.getElementById('r_project').value;

        if(!name || !project) { alert("يرجى إدخال البيانات كاملة"); return; }

        // محاكاة الإرسال للوكيل في نيويورك
        console.log("إرسال البيانات لـ DigitalOcean NYC3...");
        document.getElementById('sendBtn').innerText = "جاري المعالجة...";
        document.getElementById('sendBtn').disabled = true;

        setTimeout(() => {
            alert(`تم تسجيل ${name} بنجاح! \nتم تخصيص 8,000 د.ل للمشروع.`);
            localStorage.setItem('lastPulse', Date.now());
            location.reload();
        }, 2000);
    }
</script>

</body>
</html>
